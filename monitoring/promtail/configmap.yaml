apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail
  labels:
    app: promtail
    chart: promtail
    heritage: Helm
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: info
      log_format: json

    positions:
      filename: /var/promtail/positions.yaml
      ignore_docker_metrics: false

    clients:
      - url: http://loki:3100/loki/api/v1/push
        tenant_id: promtail
        batchwait: 10s
        batchsize: 1048576
        timeout: 60s
        backoff_config:
          min_period: 500ms
          max_period: 30s
          max_retries: 10
        streamLagLabels: [ScrapeInterval]

    scrape_configs:
      # 采集 Kubernetes Pod 日志
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - default
                - kube-system
                - monitoring
        relabel_configs:
          # 提取 Pod 名称
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
            regex: (.+)
            replacement: ${1}

          # 提取 Namespace
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
            regex: (.+)
            replacement: ${1}

          # 提取容器名称
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
            regex: (.+)
            replacement: ${1}

          # 提取 Node 名称
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
            regex: (.+)
            replacement: ${1}

          # Docker 日志路径
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_container_hash, __meta_kubernetes_container_name]
            target_label: __path__
            regex: (.+);(.+);(.+)
            replacement: /var/log/pods/${1}/${2}/${3}/*.log

      # 采集节点日志（journal）
      - job_name: systemd
        journal:
          max_age: 12h
          path: /var/log/journal
          labels:
            job: systemd-journal
        relabel_configs:
          - source_labels: [__journal__systemd_unit]
            target_label: unit
          - source_labels: [__journal__hostname]
            target_label: hostname

      # 采集容器 stdout/stderr
      - job_name: containers
        docker_sd_configs:
          - host: unix:///var/run/docker.sock
            refresh_interval: 10s
            filters:
              - name: label
                values: ["app"]
        relabel_configs:
          - source_labels: [__meta_docker_container_name]
            target_label: container
            regex: /(.+)
            replacement: ${1}
          - source_labels: [__meta_docker_container_log_stream]
            target_label: logstream
          - source_labels: [__meta_docker_network_interface]
            target_label: network
