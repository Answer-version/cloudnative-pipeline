# ===================================================================
# Pod 资源告警规则
# 注意：告警抑制规则（inhibit_rules）配置在
# monitoring/alertmanager/configmap.yaml 中
# ===================================================================

# Prometheus Alert Rules - Pod Resources
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-resource-alerts
  namespace: monitoring
  labels:
    app: prometheus
    component: rules
    release: prometheus-operator
spec:
  groups:
    - name: pod-resources
      rules:
        # PodCPUUsage - CPU 使用率告警
        - alert: PodCPUUsageHigh
          expr: |
            sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod, namespace)
            / 
            sum(kube_pod_container_resource_limits{resource="cpu", container!=""}) by (pod, namespace)
            > 0.8
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod CPU 使用率过高"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} CPU 使用率超过 80% 限制 (当前: {{ $value | humanizePercentage }})"
            runbook_url: "https://runbooks.example.com/pod-cpu-high"

        - alert: PodCPUUsageCritical
          expr: |
            sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod, namespace)
            / 
            sum(kube_pod_container_resource_limits{resource="cpu", container!=""}) by (pod, namespace)
            > 0.95
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Pod CPU 使用率严重过高"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} CPU 使用率超过 95% (当前: {{ $value | humanizePercentage }})"

        # PodMemoryUsage - 内存使用率告警
        - alert: PodMemoryUsageHigh
          expr: |
            sum(container_memory_working_set_bytes{container!=""}) by (pod, namespace)
            /
            sum(kube_pod_container_resource_limits{resource="memory", container!=""}) by (pod, namespace)
            > 0.8
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod 内存使用率过高"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 内存使用率超过 80% (当前: {{ $value | humanizePercentage }})"
            runbook_url: "https://runbooks.example.com/pod-memory-high"

        - alert: PodMemoryUsageCritical
          expr: |
            sum(container_memory_working_set_bytes{container!=""}) by (pod, namespace)
            /
            sum(kube_pod_container_resource_limits{resource="memory", container!=""}) by (pod, namespace)
            > 0.95
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Pod 内存使用率严重过高"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 内存使用率超过 95% (当前: {{ $value | humanizePercentage }})"

        # PodNotReady - Pod 就绪状态告警
        - alert: PodNotReady
          expr: |
            sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown"})
            + sum by (namespace, pod) (kube_pod_status_ready{condition="false"})
            > 0
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod 未就绪"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 处于非就绪状态超过 5 分钟"
            runbook_url: "https://runbooks.example.com/pod-not-ready"

        - alert: PodReadyZero
          expr: |
            sum by (namespace, pod) (kube_pod_status_ready{condition="true"}) == 0
          for: 1m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "所有 Pod 副本均未就绪"
            description: "Deployment {{ $labels.namespace }}/{{ $labels.pod }} 所有副本均未就绪"

        # Pod 重启告警
        - alert: PodRestartHigh
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) > 0.1
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod 重启频率过高"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 重启频率异常 (当前: {{ $value | humanize }})"

        # Pod OOMKilled
        - alert: PodOOMKilled
          expr: |
            increase(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[5m]) > 0
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod 被 OOM 杀死"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 容器因内存超限被 OOM 杀死"
