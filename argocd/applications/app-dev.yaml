apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-dev
  namespace: argocd
  labels:
    app: cloudnative-app
    environment: dev
    tier: application
  finalizers:
    - resources.finalizer.argocd.argoproj.io
spec:
  project: cloudnative-project
  
  source:
    # ===================================================================
    # TODO: 重要配置 - 部署前必须修改
    # 1. 将 repoURL 替换为实际的 GitOps 仓库地址
    # 2. 确保 targetRevision 与实际分支一致 (master)
    # 3. 替换 kustomize.images 中的镜像地址
    # ===================================================================
    repoURL: https://github.com/your-org/gitops.git
    targetRevision: master
    path: gitops/apps/app/overlays/dev
    kustomize:
      images:
        - ghcr.io/your-org/your-repo:$(IMAGE_TAG)
      commonAnnotations:
        environment: dev
        managed-by: argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - Replace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    ignoreDifferences:
      - group: apps
        kind: Deployment
        jsonPointers:
          - /spec/replicas
      - group: ""
        kind: ServiceAccount
        jsonPointers:
          - /secrets
    revisionHistoryLimit: 10

  info:
    - name: Environment
      value: development
    - name: Team
      value: platform-engineering
    - name: Namespace
      value: dev
    - name: SyncPolicy
      value: automated
