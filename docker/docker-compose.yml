# ===================================================================
# CloudNative Pipeline - 本地开发环境
# ===================================================================
# 启动命令: docker compose up -d
# 停止命令: docker compose down
# 查看日志: docker compose logs -f app
# ===================================================================

services:
  # ----------------------------------------------------------------
  # 应用服务
  # ----------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev  # 使用开发阶段，支持热重载
    container_name: cn-pipeline-app
    ports:
      - "8080:8080"   # 应用端口
      - "9090:9090"   # Prometheus metrics 端口
    environment:
      # 数据库配置
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_NAME=cloudnative_pipeline
      - DB_SSLMODE=disable

      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redisStrongPass2026!}

      # MinIO 配置 (S3 兼容对象存储)
      - S3_ENDPOINT=minio
      - S3_PORT=9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=pipeline-artifacts
      - S3_REGION=us-east-1

      # 应用配置
      - APP_ENV=development
      - APP_LOG_LEVEL=debug
      - APP_PORT=8080

      # Pipeline 配置
      - PIPELINE_WORKERS=4
      - PIPELINE_QUEUE_NAME=pipeline-tasks
    volumes:
      # 源码挂载（热重载）
      - ../cmd:/app/cmd:ro
      - ../internal:/app/internal:ro
      - ../pkg:/app/pkg:ro
      # 配置挂载
      - ./config.yaml:/app/config.yaml:ro
      # Docker socket（用于构建镜像）
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - pipeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------------
  # PostgreSQL 数据库
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cn-pipeline-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=cloudnative_pipeline
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - pipeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloudnative_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------
  # Redis 缓存/消息队列
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cn-pipeline-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redisStrongPass2026!}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - pipeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redisStrongPass2026!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------
  # MinIO 对象存储
  # ----------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: cn-pipeline-minio
    ports:
      - "9000:9000"    # API 端口
      - "9001:9001"    # Console 端口
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ./minio-data:/data
    networks:
      - pipeline-network
    restart: unless-stopped
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------------
  # MinIO Client (初始化 bucket)
  # ----------------------------------------------------------------
  minio-setup:
    image: minio/mc:latest
    container_name: cn-pipeline-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/pipeline-artifacts --ignore-existing;
      mc anonymous set download local/pipeline-artifacts;
      exit 0;
      "
    networks:
      - pipeline-network

  # ----------------------------------------------------------------
  # Prometheus 监控
  # ----------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: cn-pipeline-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - pipeline-network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Jaeger 分布式追踪
  # ----------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: cn-pipeline-jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
    networks:
      - pipeline-network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Nginx 反向代理 (API Gateway)
  # ----------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: cn-pipeline-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - pipeline-network
    restart: unless-stopped

# ===================================================================
# 网络定义
# ===================================================================
networks:
  pipeline-network:
    driver: bridge
    name: cn-pipeline-network

# ===================================================================
# 卷定义
# ===================================================================
volumes:
  postgres-data:
    name: cn-pipeline-postgres-data
  redis-data:
    name: cn-pipeline-redis-data
  minio-data:
    name: cn-pipeline-minio-data
  prometheus-data:
    name: cn-pipeline-prometheus-data
