# ===================================================================
# CloudNative Pipeline - Docker Compose 单机版
# ===================================================================
# 启动命令: docker compose up -d
# 停止命令: docker compose down
# 查看日志: docker compose logs -f app
#
# 环境变量: 所有配置从 .env 文件读取（勿修改此文件）
# ===================================================================

services:
  # ------------------------------------------------------------------
  # 应用服务 (Go)
  # ------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    container_name: cn-pipeline-app
    ports:
      - "${APP_PORT:-8080}:8080"
      - "9090:9090"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - S3_ENDPOINT=minio
      - S3_PORT=${S3_PORT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=us-east-1
      - APP_ENV=${APP_ENV}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL}
      - APP_PORT=${APP_PORT}
    volumes:
      - ../cmd:/app/cmd:ro
      - ../internal:/app/internal:ro
      - ../pkg:/app/pkg:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - pipeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ------------------------------------------------------------------
  # PostgreSQL 数据库
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cn-pipeline-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pipeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ------------------------------------------------------------------
  # Redis 缓存
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cn-pipeline-redis
    ports:
      - "${REDIS_PORT}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - pipeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ------------------------------------------------------------------
  # Prometheus 监控
  # ------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: cn-pipeline-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - pipeline-network
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Grafana 可视化仪表盘
  # ------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11
    container_name: cn-pipeline-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - pipeline-network
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Loki 日志聚合
  # ------------------------------------------------------------------
  loki:
    image: grafana/loki:3
    container_name: cn-pipeline-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    command: -config.expand-env=true
    networks:
      - pipeline-network
    restart: unless-stopped

  # ------------------------------------------------------------------
  # MinIO 对象存储
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: cn-pipeline-minio
    ports:
      - "${S3_PORT}:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - pipeline-network
    restart: unless-stopped
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s

  # ------------------------------------------------------------------
  # MinIO Client (初始化 Bucket)
  # ------------------------------------------------------------------
  minio-setup:
    image: minio/mc:latest
    container_name: cn-pipeline-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb local/${S3_BUCKET} --ignore-existing;
      mc anonymous set download local/${S3_BUCKET};
      exit 0;
      "
    networks:
      - pipeline-network

# ===================================================================
# 网络定义
# ===================================================================
networks:
  pipeline-network:
    driver: bridge
    name: cn-pipeline-network

# ===================================================================
# 卷定义
# ===================================================================
volumes:
  postgres-data:
    name: cn-pipeline-postgres-data
  redis-data:
    name: cn-pipeline-redis-data
  minio-data:
    name: cn-pipeline-minio-data
  prometheus-data:
    name: cn-pipeline-prometheus-data
  grafana-data:
    name: cn-pipeline-grafana-data
  loki-data:
    name: cn-pipeline-loki-data
