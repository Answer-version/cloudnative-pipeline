# ===================================================================
# CloudNative Pipeline - 应用 Deployment
# ===================================================================
# 部署命令: kubectl apply -f k8s/base/deployment.yaml
# 查看状态: kubectl get deploy cloudnative-pipeline -n pipeline
# ===================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudnative-pipeline
  namespace: pipeline
  labels:
    app: cloudnative-pipeline
    app.kubernetes.io/name: cloudnative-pipeline
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: pipeline-platform
    version: v1.0.0
  annotations:
    # 描述信息
    description: "CloudNative Pipeline 微服务平台主应用"
    # 部署版本（更新时自动更新）
spec:
  # ----------------------------------------------------------------
  # 副本数配置
  # ----------------------------------------------------------------
  replicas: 3

  # ----------------------------------------------------------------
  # 滚动更新策略
  # ----------------------------------------------------------------
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1           # 最多可以创建 1 个额外副本
      maxUnavailable: 0    # 滚动更新过程中，所有副本都必须可用

  # ----------------------------------------------------------------
  # 选择器（必须匹配 Pod 标签）
  # ----------------------------------------------------------------
  selector:
    matchLabels:
      app: cloudnative-pipeline

  # ----------------------------------------------------------------
  # Pod 模板
  # ----------------------------------------------------------------
  template:
    metadata:
      labels:
        app: cloudnative-pipeline
        version: v1.0.0
      annotations:
        # Prometheus 指标采集
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # ----------------------------------------------------------------
      # 亲和性配置
      # ----------------------------------------------------------------
      affinity:
        # Pod 反亲和性：分散到不同节点
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - cloudnative-pipeline
                topologyKey: kubernetes.io/hostname

        # 节点亲和性：优先调度到专用 worker 节点
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/worker
                    operator: Exists

      # ----------------------------------------------------------------
      # 安全上下文
      # ----------------------------------------------------------------
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000

      # ----------------------------------------------------------------
      # 容器配置
      # ----------------------------------------------------------------
      containers:
        - name: app
          # 镜像（CI/CD 流水线会更新此字段）
          image: registry.example.com/cloudnative-pipeline:v1.0.0
          imagePullPolicy: Always

          # 端口配置
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # ----------------------------------------------------------------
          # 环境变量
          # ----------------------------------------------------------------
          env:
            # 应用基本配置
            - name: APP_ENV
              value: "production"
            - name: APP_PORT
              value: "8080"
            - name: GIN_MODE
              value: "release"

            # 数据库配置（从 Secret 引用）
            - name: DB_HOST
              value: "postgres-headless.pipeline.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "pipeline_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cloudnative-pipeline-secrets
                  key: db-username
                  optional: false
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudnative-pipeline-secrets
                  key: db-password
                  optional: false
            - name: DB_SSLMODE
              value: "require"

            # Redis 配置
            - name: REDIS_HOST
              value: "redis-headless.pipeline.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudnative-pipeline-secrets
                  key: redis-password
                  optional: false

            # S3/MinIO 配置
            - name: S3_ENDPOINT
              value: "http://minio.pipeline.svc.cluster.local:9000"
            - name: S3_BUCKET
              value: "pipeline-artifacts"
            - name: S3_REGION
              value: "us-east-1"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudnative-pipeline-secrets
                  key: s3-access-key
                  optional: false
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudnative-pipeline-secrets
                  key: s3-secret-key
                  optional: false

            # Pipeline 工作配置
            - name: PIPELINE_WORKERS
              value: "4"
            - name: PIPELINE_QUEUE_NAME
              value: "pipeline-tasks"

            # OpenTelemetry 追踪
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-collector.pipeline.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "cloudnative-pipeline"

          # ----------------------------------------------------------------
          # 资源限制
          # ----------------------------------------------------------------
          resources:
            requests:
              cpu: 100m           # 最小请求 CPU
              memory: 128Mi       # 最小请求内存
            limits:
              cpu: 500m           # 最大限制 CPU
              memory: 512Mi       # 最大限制内存

          # ----------------------------------------------------------------
          # 健康检查
          # ----------------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10   # 启动后 10 秒开始检查
            periodSeconds: 15         # 每 15 秒检查一次
            timeoutSeconds: 5         # 超时 5 秒
            failureThreshold: 3       # 连续 3 次失败后重启容器

          readinessProbe:
            httpGet:
              path: /ready
              port: http
              scheme: HTTP
            initialDelaySeconds: 5    # 启动后 5 秒开始检查
            periodSeconds: 10         # 每 10 秒检查一次
            timeoutSeconds: 3         # 超时 3 秒
            failureThreshold: 3       # 连续 3 次失败标记为不ready
            successThreshold: 1       # 1 次成功即标记为 ready

          # ----------------------------------------------------------------
          # 启动探针（用于慢启动应用）
          # ----------------------------------------------------------------
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30      # 最多尝试 30 次 (30 * 5s = 150s)

          # ----------------------------------------------------------------
          # 容器安全上下文
          # ----------------------------------------------------------------
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE

          # ----------------------------------------------------------------
          # 卷挂载
          # ----------------------------------------------------------------
          volumeMounts:
            # 临时存储（用于写入 /tmp）
            - name: tmp-volume
              mountPath: /tmp
            # 配置文件
            - name: config-volume
              mountPath: /app/config
              readOnly: true

      # ----------------------------------------------------------------
      # Init 容器（等待依赖服务就绪）
      # ----------------------------------------------------------------
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres-headless.pipeline.svc.cluster.local 5432; do
                echo "PostgreSQL is not ready, waiting..."
                sleep 2
              done
              echo "PostgreSQL is ready!"

      # ----------------------------------------------------------------
      # 数据卷
      # ----------------------------------------------------------------
      volumes:
        - name: tmp-volume
          emptyDir:
            sizeLimit: 100Mi
        - name: config-volume
          configMap:
            name: cloudnative-pipeline-config
            optional: true

      # ----------------------------------------------------------------
      # 终止策略
      # ----------------------------------------------------------------
      terminationGracePeriodSeconds: 120  # 优雅终止等待时间

      # ----------------------------------------------------------------
      # DNS 配置
      # ----------------------------------------------------------------
      dnsPolicy: ClusterFirst
      dnsConfig:
        nameservers:
          - 8.8.8.8
        searches:
          - pipeline.svc.cluster.local
          - svc.cluster.local
        options:
          - name: ndots
            value: "2"
