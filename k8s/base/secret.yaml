# ===================================================================
# CloudNative Pipeline - Secret 配置模板
# ===================================================================
# ⚠️ 注意：这是模板文件，包含占位符
# 部署前请替换为实际值或使用 sealed-secrets/bitnami-sealed-secrets
# 部署命令: kubectl apply -f k8s/base/secret.yaml
# ===================================================================

apiVersion: v1
kind: Secret
metadata:
  name: cloudnative-pipeline-secrets
  namespace: pipeline
  labels:
    app: cloudnative-pipeline
    app.kubernetes.io/name: cloudnative-pipeline
  annotations:
    description: "CloudNative Pipeline 敏感信息配置"
    # 不要手动编辑此文件，使用 kubectl create secret generic 或密封密钥
type: Opaque
stringData:
  # ----------------------------------------------------------------
  # 数据库凭证
  # ----------------------------------------------------------------
  db-username: "pipeline_user"           # ⚠️ 替换为实际用户名
  db-password: "CHANGE_ME_DB_PASSWORD"   # ⚠️ 替换为强密码

  # ----------------------------------------------------------------
  # Redis 凭证
  # ----------------------------------------------------------------
  redis-password: "CHANGE_ME_REDIS_PASSWORD"  # ⚠️ 替换为强密码

  # ----------------------------------------------------------------
  # S3/MinIO 凭证
  # ----------------------------------------------------------------
  s3-access-key: "CHANGE_ME_S3_ACCESS_KEY"     # ⚠️ 替换为实际 Access Key
  s3-secret-key: "CHANGE_ME_S3_SECRET_KEY"     # ⚠️ 替换为实际 Secret Key

  # ----------------------------------------------------------------
  # JWT 密钥
  # ----------------------------------------------------------------
  jwt-secret: "CHANGE_ME_JWT_SECRET_KEY_MIN_32_CHARS"  # ⚠️ 替换为 32+ 字符密钥
  jwt-refresh-secret: "CHANGE_ME_JWT_REFRESH_SECRET"   # ⚠️ 替换为实际密钥

  # ----------------------------------------------------------------
  # 邮件服务（可选）
  # ----------------------------------------------------------------
  smtp-username: ""          # 邮件发送用户名
  smtp-password: ""         # 邮件发送密码
  smtp-host: "smtp.example.com"
  smtp-port: "587"
  smtp-from: "noreply@example.com"

  # ----------------------------------------------------------------
  # Git 凭证（用于私有仓库）
  # ----------------------------------------------------------------
  git-ssh-key: ""           # Base64 编码的 SSH 私钥
  git-known-hosts: ""       # Base64 编码的 known_hosts

  # ----------------------------------------------------------------
  # Docker Registry 凭证
  # ----------------------------------------------------------------
  docker-registry-username: ""   # Docker Hub 用户名
  docker-registry-password: ""    # Docker Hub 密码/Token
  docker-registry-email: ""      # Docker Hub 邮箱

---

# ===================================================================
# TLS Secret 模板
# ===================================================================
# ⚠️ 生产环境请使用 cert-manager 自动签发
# 或者手动创建: kubectl create secret tls cloudnative-pipeline-tls \
#   --cert=path/to/cert.pem --key=path/to/key.pem
apiVersion: v1
kind: Secret
metadata:
  name: cloudnative-pipeline-tls
  namespace: pipeline
  labels:
    app: cloudnative-pipeline
type: kubernetes.io/tls
stringData:
  # ⚠️ 替换为实际的证书和私钥内容
  # 或使用 cert-manager 自动管理
  #
  # tls.crt: |
  #   -----BEGIN CERTIFICATE-----
  #   YOUR_CERTIFICATE_HERE
  #   -----END CERTIFICATE-----
  #
  # tls.key: |
  #   -----BEGIN PRIVATE KEY-----
  #   YOUR_PRIVATE_KEY_HERE
  #   -----END PRIVATE KEY-----

---

# ===================================================================
# 镜像拉取 Secret（私有仓库）
# ===================================================================
# 创建命令:
# kubectl create secret docker-registry registry-credentials \
#   --docker-server=https://index.docker.io/v1/ \
#   --docker-username=YOUR_USERNAME \
#   --docker-password=YOUR_PASSWORD \
#   --docker-email=YOUR_EMAIL \
#   --namespace=pipeline
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: pipeline
  labels:
    app: cloudnative-pipeline
type: kubernetes.io/dockerconfigjson
stringData:
  # ⚠️ 替换为实际的 Docker config
  # .dockerconfigjson: |
  #   {
  #     "auths": {
  #       "https://index.docker.io/v1/": {
  #         "username": "YOUR_USERNAME",
  #         "password": "YOUR_PASSWORD",
  #         "email": "YOUR_EMAIL",
  #         "auth": "BASE64_ENCODED_AUTH_STRING"
  #       }
  #     }
  #   }

---

# ===================================================================
# Sealed Secrets（推荐用于生产环境）
# ===================================================================
# 使用 Bitnami Sealed Secrets 加密敏感信息
# 安装: kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/latest/download/controller.yaml
#
# 示例 SealedSecret:
# apiVersion: bitnami.com/v1alpha1
# kind: SealedSecret
# metadata:
#   name: cloudnative-pipeline-secrets
#   namespace: pipeline
# spec:
#   encryptedData:
#     db-username: AgA...  # kubeseal 加密后的数据
#     db-password: AgB...
#     redis-password: AgC...
#     jwt-secret: AgD...
#     s3-access-key: AgE...
#     s3-secret-key: AgF...
