# ===================================================================
# CloudNative Pipeline - Ingress 配置
# ===================================================================
# 需要先部署 Nginx Ingress Controller
# 部署命令: kubectl apply -f k8s/base/ingress.yaml
# ===================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudnative-pipeline-ingress
  namespace: pipeline
  labels:
    app: cloudnative-pipeline
    app.kubernetes.io/name: cloudnative-pipeline
  annotations:
    # ----------------------------------------------------------------
    # Nginx Ingress 配置
    # ----------------------------------------------------------------
    # 注释掉ingress-class名称，使用 default  ingressClassName: nginx
    kubernetes.io/ingress.class: nginx

    # SSL 配置
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # 代理配置
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # WebSocket 支持
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
    nginx.ingress.kubernetes.io/use-regex: "true"

    # CORS 配置
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "PUT, GET, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization,Content-Type,Accept,Origin,User-Agent,Cache-Control,Keep-Alive,X-Requested-With"

    # 速率限制
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"

    # 跳过的路径
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # 移除响应头中的版本信息
      proxy_hide_header X-Powered-By;
      proxy_hide_header Server;

    # 错误页面配置
    nginx.ingress.kubernetes.io/custom-http-errors: "404,500,502,503,504"

  name: cloudnative-pipeline
spec:
  # ----------------------------------------------------------------
  # Ingress Class
  # ----------------------------------------------------------------
  ingressClassName: nginx

  # ----------------------------------------------------------------
  # TLS 配置（可选）
  # ----------------------------------------------------------------
  tls:
    - hosts:
        - pipeline.example.com
        - minio.example.com
        - jaeger.example.com
      secretName: cloudnative-pipeline-tls

  # ----------------------------------------------------------------
  # 路由规则
  # ----------------------------------------------------------------
  rules:
    # 主应用域名
    - host: pipeline.example.com
      http:
        paths:
          # API 路径
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cloudnative-pipeline
                port:
                  number: 80
            # 重写规则（去除前缀）
            # annotations:
            #   nginx.ingress.kubernetes.io/rewrite-target: /$2

          # WebSocket 路径
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: cloudnative-pipeline
                port:
                  number: 80

          # 静态资源
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: cloudnative-pipeline
                port:
                  number: 80

          # 默认回退（根路径）
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudnative-pipeline
                port:
                  number: 80

    # MinIO 控制台域名
    - host: minio.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001

    # Jaeger 追踪 UI 域名
    - host: jaeger.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 16686

    # Prometheus 监控域名（可选项）
    - host: prometheus.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090

---

# ===================================================================
# IngressClass 资源（Kubernetes 1.18+）
# ===================================================================
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: nginx
  labels:
    app.kubernetes.io/name: nginx-ingress
  annotations:
    # 设置为默认 IngressClass
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: k8s.io/ingress-nginx

---

