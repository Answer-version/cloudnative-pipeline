apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudnative-app
  labels:
    app: cloudnative-app
    app.kubernetes.io/name: cloudnative-app
spec:
  podSelector:
    matchLabels:
      app: cloudnative-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # 只允许集群内部 DNS 和必要服务
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # 允许访问依赖的集群内部服务
    - to:
        - podSelector:
            matchLabels:
              app: postgres
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
